<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Supabase SQL · 一键复制</title>
<style>
  body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0f172a; color:#e2e8f0; }
  header { display:flex; gap:12px; align-items:center; padding:14px 20px; background:#1e293b; border-bottom:1px solid #334155; position:sticky; top:0; z-index:10; }
  h1 { margin:0; font-size:15px; font-weight:600; }
  .tabs { display:flex; gap:8px; border-bottom:1px solid #334155; background:#1e293b; padding:0 20px; }
  .tab { padding:10px 16px; cursor:pointer; color:#94a3b8; border-bottom:2px solid transparent; font-size:13px; font-weight:500; }
  .tab.active { color:#e2e8f0; border-color:#3b82f6; }
  button { padding:8px 16px; background:#3b82f6; color:white; border:0; border-radius:6px; font-size:14px; cursor:pointer; font-weight:500; }
  button:hover { background:#2563eb; }
  button.ok { background:#10b981; }
  pre { margin:0; padding:20px; font-size:12px; line-height:1.55; white-space:pre; overflow:auto; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .hint { font-size:12px; color:#94a3b8; }
  .step { font-size:12px; color:#64748b; padding:8px 20px; background:#1e293b; border-bottom:1px solid #334155; }
</style>
</head>
<body>
<header>
  <h1>Supabase SQL</h1>
  <button id="copy">复制当前</button>
  <span class="hint">Supabase Studio → SQL Editor → New query → 粘贴 → Run</span>
</header>
<div class="tabs">
  <div class="tab active" data-tab="schema">① 01_schema.sql</div>
  <div class="tab" data-tab="rls">② 02_rls.sql</div>
</div>
<div class="step" id="step">第 1 步：先跑 schema 建表</div>
<pre id="code"></pre>

<script type="text/plain" id="schema">
-- ============================================================
-- 打卡小程序 · Supabase schema
-- Run this in Supabase Studio → SQL Editor → New query
-- ============================================================

-- ============= TABLES =============

create table public.profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  name text not null,
  avatar_url text default '',
  signature text default '',
  wall_public boolean default true,
  is_admin boolean default false,
  created_at timestamptz default now()
);

create table public.checkins (
  id bigserial primary key,
  user_id uuid not null references auth.users(id) on delete cascade,
  content text not null,
  checked_date date not null,
  image_1 text default '',
  image_2 text default '',
  image_3 text default '',
  audio_url text default '',
  video_url text default '',
  like_count int default 0,
  created_at timestamptz default now(),
  unique (user_id, checked_date)
);
create index on public.checkins (user_id, created_at desc);
create index on public.checkins (created_at desc);
create index on public.checkins (checked_date);

create table public.likes (
  id bigserial primary key,
  user_id uuid not null references auth.users(id) on delete cascade,
  checkin_id bigint not null references public.checkins(id) on delete cascade,
  created_at timestamptz default now(),
  unique (user_id, checkin_id)
);
create index on public.likes (checkin_id);

create table public.comments (
  id bigserial primary key,
  user_id uuid not null references auth.users(id) on delete cascade,
  checkin_id bigint not null references public.checkins(id) on delete cascade,
  content text not null,
  created_at timestamptz default now()
);
create index on public.comments (checkin_id, created_at);

create table public.settings (
  key text primary key,
  value text not null,
  updated_at timestamptz default now()
);
insert into public.settings (key, value) values ('activity_name', '100人100天打卡活动');

create table public.goals (
  id bigserial primary key,
  user_id uuid not null references auth.users(id) on delete cascade,
  title text not null,
  description text default '',
  target_days int default 100,
  active boolean default true,
  created_at timestamptz default now()
);
create index on public.goals (user_id);

-- ============= TRIGGERS =============

-- Auto-create profile on signup (reads name from raw_user_meta_data)
create or replace function public.handle_new_user() returns trigger as $$
begin
  insert into public.profiles (id, name)
  values (
    new.id,
    coalesce(new.raw_user_meta_data->>'name', split_part(new.email, '@', 1))
  );
  return new;
end;
$$ language plpgsql security definer;

drop trigger if exists on_auth_user_created on auth.users;
create trigger on_auth_user_created
  after insert on auth.users
  for each row execute function public.handle_new_user();

-- Keep checkins.like_count in sync with likes table
create or replace function public.update_like_count() returns trigger as $$
begin
  if (tg_op = 'INSERT') then
    update public.checkins set like_count = like_count + 1 where id = new.checkin_id;
  elsif (tg_op = 'DELETE') then
    update public.checkins set like_count = greatest(0, like_count - 1) where id = old.checkin_id;
  end if;
  return null;
end;
$$ language plpgsql security definer;

drop trigger if exists likes_count_trigger on public.likes;
create trigger likes_count_trigger
  after insert or delete on public.likes
  for each row execute function public.update_like_count();

-- ============= VIEWS / RPCS =============

-- Leaderboard: unique checkin days per user (distinct dates)
create or replace view public.leaderboard_v as
  select
    p.id,
    p.name,
    p.avatar_url,
    p.signature,
    p.wall_public,
    count(distinct c.checked_date) as total_days
  from public.profiles p
  left join public.checkins c on c.user_id = p.id
  group by p.id;

-- Admin stats RPC
create or replace function public.admin_stats() returns json as $$
declare
  result json;
begin
  if not exists(select 1 from public.profiles where id = auth.uid() and is_admin) then
    raise exception '无权限';
  end if;
  select json_build_object(
    'totalUsers', (select count(*) from public.profiles),
    'totalCheckins', (select count(*) from public.checkins),
    'totalLikes', (select count(*) from public.likes),
    'totalComments', (select count(*) from public.comments),
    'todayCheckins', (select count(*) from public.checkins where checked_date = current_date),
    'recent7DaysCheckins', (select count(*) from public.checkins where checked_date >= current_date - 6),
    'dailyTrend', (
      select json_agg(json_build_object('date', d::date, 'count', coalesce(cnt, 0)) order by d)
      from generate_series(current_date - 6, current_date, '1 day') d
      left join (
        select checked_date, count(*) as cnt
        from public.checkins
        where checked_date >= current_date - 6
        group by checked_date
      ) c on c.checked_date = d
    )
  ) into result;
  return result;
end;
$$ language plpgsql security definer;
</script>

<script type="text/plain" id="rls">
-- ============================================================
-- Row-Level Security policies
-- Run AFTER 01_schema.sql
-- ============================================================

alter table public.profiles enable row level security;
alter table public.checkins enable row level security;
alter table public.likes    enable row level security;
alter table public.comments enable row level security;
alter table public.settings enable row level security;
alter table public.goals    enable row level security;

-- =========== profiles ===========
create policy "profiles: read all"    on public.profiles for select using (true);
create policy "profiles: update own"  on public.profiles for update using (auth.uid() = id);
create policy "profiles: insert self" on public.profiles for insert with check (auth.uid() = id);
-- Admin can update anyone (e.g., set is_admin flag)
create policy "profiles: admin all"   on public.profiles for all
  using (exists(select 1 from public.profiles p where p.id = auth.uid() and p.is_admin));

-- =========== checkins ===========
-- Read: public wall OR own
create policy "checkins: read public" on public.checkins for select using (
  exists(select 1 from public.profiles p where p.id = user_id and (p.wall_public or auth.uid() = user_id))
);
create policy "checkins: insert own"  on public.checkins for insert with check (auth.uid() = user_id);
create policy "checkins: update own"  on public.checkins for update using (auth.uid() = user_id);
create policy "checkins: delete own or admin" on public.checkins for delete using (
  auth.uid() = user_id
  or exists(select 1 from public.profiles where id = auth.uid() and is_admin)
);

-- =========== likes ===========
create policy "likes: read all"    on public.likes for select using (true);
create policy "likes: insert own"  on public.likes for insert with check (auth.uid() = user_id);
create policy "likes: delete own"  on public.likes for delete using (auth.uid() = user_id);

-- =========== comments ===========
create policy "comments: read all" on public.comments for select using (true);
create policy "comments: insert authed" on public.comments for insert with check (auth.uid() = user_id);
create policy "comments: delete own or admin" on public.comments for delete using (
  auth.uid() = user_id
  or exists(select 1 from public.profiles where id = auth.uid() and is_admin)
);

-- =========== settings ===========
create policy "settings: read all"  on public.settings for select using (true);
create policy "settings: admin write" on public.settings for all
  using (exists(select 1 from public.profiles where id = auth.uid() and is_admin));

-- =========== goals ===========
create policy "goals: own"   on public.goals for all using (auth.uid() = user_id);

-- =========== Storage bucket =============================================
-- Run from Supabase Studio → Storage → New bucket (UI is easier than SQL).
-- Bucket: name="media", public=ON. Then run policies below.
-- Path convention: media/<user_id>/<checkin_id>/<filename>

create policy "media: upload own"
  on storage.objects for insert
  with check (
    bucket_id = 'media'
    and auth.uid()::text = (storage.foldername(name))[1]
  );

create policy "media: read public"
  on storage.objects for select
  using (bucket_id = 'media');

create policy "media: delete own"
  on storage.objects for delete
  using (
    bucket_id = 'media'
    and auth.uid()::text = (storage.foldername(name))[1]
  );
</script>

<script>
  const STEPS = {
    schema: '第 1 步：先跑 schema 建表',
    rls: '第 2 步：等 schema 跑完没报错，再跑这个开启 RLS'
  };

  function get(id) {
    return document.getElementById(id).textContent.replace(/^\n/, '');
  }

  let current = 'schema';
  function show(tab) {
    current = tab;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.getElementById('code').textContent = get(tab);
    document.getElementById('step').textContent = STEPS[tab];
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => show(t.dataset.tab));
  });

  document.getElementById('copy').onclick = async () => {
    const text = get(current);
    try { await navigator.clipboard.writeText(text); }
    catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    const b = document.getElementById('copy');
    const label = current === 'schema' ? '已复制 schema ✓' : '已复制 RLS ✓';
    b.textContent = label; b.classList.add('ok');
    setTimeout(() => { b.textContent = '复制当前'; b.classList.remove('ok'); }, 2000);
  };

  show('schema');
</script>
</body>
</html>
